name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Build
        run: mise run build:solution

      - name: Run Tests
        run: mise run test

  build:
    needs: test
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: windows-latest
            rid: win-x64

    steps:
      - uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Build
        run: mise x -- dotnet publish -c Release -r ${{ matrix.rid }}

      - name: Package
        shell: pwsh
        run: |
          $ARTIFACT_NAME = "fgvm-${{ matrix.rid }}.zip"
          $TARGET = "${{ matrix.os }}" -eq "windows-latest" ? "fgvm.exe" : "fgvm"
          $SOURCE = Join-Path "Fgvm.Cli" "bin" "Release" "net10.0" "${{ matrix.rid }}" "publish" "$TARGET"

          # Create ZIP
          Compress-Archive -Path $SOURCE -DestinationPath $ARTIFACT_NAME -Force

          # Generate SHA256
          $hash = (Get-FileHash -Algorithm SHA256 $ARTIFACT_NAME).Hash.ToLower()
          "$hash  $ARTIFACT_NAME" | Out-File -FilePath "$ARTIFACT_NAME.sha256"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: fgvm-${{ matrix.rid }}
          path: |
            fgvm-${{ matrix.rid }}.zip
            fgvm-${{ matrix.rid }}.zip.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v7

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            */fgvm-*.zip
            */fgvm-*.sha256
          generate_release_notes: false
