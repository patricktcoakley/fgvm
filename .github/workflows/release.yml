name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Build
        run: mise run build:solution

      - name: Run Tests
        run: mise run test

  build:
    needs: test
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: windows-latest
            rid: win-x64
          - os: macos-15-intel
            rid: osx-x64
          - os: macos-14
            rid: osx-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Build
        run: mise x -- dotnet publish -c Release -r ${{ matrix.rid }}

      - name: Package
        id: package
        shell: pwsh
        run: |
          $TARGET = "${{ matrix.rid }}".StartsWith("win") ? "fgvm.exe" : "fgvm"
          $SOURCE = Join-Path "Fgvm.Cli" "bin" "Release" "net10.0" "${{ matrix.rid }}" "publish" "$TARGET"
          $package = ./scripts/package-release.ps1 -Rid "${{ matrix.rid }}" -Source $SOURCE
          "artifact_name=$($package.ArtifactName)" >> $env:GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: fgvm-${{ matrix.rid }}
          path: |
            ${{ steps.package.outputs.artifact_name }}
            ${{ steps.package.outputs.artifact_name }}.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v7

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            */fgvm-*.zip
            */fgvm-*.tar.gz
            */fgvm-*.sha256
          generate_release_notes: false
