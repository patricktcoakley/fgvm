name: Test All Platforms
permissions:
  contents: read

on:
  workflow_dispatch:
  merge_group:
    types: [checks_requested]

jobs:
  test:
    name: Native E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Run Unit Tests
        run: dotnet test Fgvm.Tests --configuration Release --no-build --verbosity normal --logger "console;verbosity=detailed"

      - name: Prepare Native E2E Fixtures
        run: |
          dotnet run Fgvm.Tests.EndToEnd/Fixtures/BuildFixtures.cs
          dotnet run Fgvm.Tests.EndToEnd/Fixtures/PublishCli.cs

      - name: Run Native E2E Tests
        run: dotnet test Fgvm.Tests.EndToEnd --configuration Release --no-build --verbosity normal --logger "console;verbosity=detailed"
