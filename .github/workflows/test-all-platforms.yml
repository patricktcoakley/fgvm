name: Integration
permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - auto_merge_enabled
  merge_group:
    types: [checks_requested]

jobs:
  test:
    name: Integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Run Integration Tests
        run: mise run test:integration

  required:
    name: Integration
    runs-on: ubuntu-24.04
    needs: test
    if: ${{ always() }}
    steps:
      - name: Verify Integration Matrix Result
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::Integration matrix finished with result '${{ needs.test.result }}'."
            exit 1
          fi
