name: Container

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to publish (e.g. 2.3.0). Builds from the selected ref."
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v7

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Resolve Image Name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/fgvm" >> "$GITHUB_OUTPUT"

      - name: Resolve Source Date
        id: source-date
        shell: bash
        run: echo "epoch=$(git log -1 --format=%ct)" >> "$GITHUB_OUTPUT"

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log In To GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        env:
          FGVM_IMAGE: ${{ steps.image.outputs.name }}
          FGVM_PLATFORMS: ${{ matrix.platform }}
          FGVM_PUSH_BY_DIGEST: 'true'
          FGVM_METADATA_FILE: ${{ runner.temp }}/metadata.json
          SOURCE_DATE_EPOCH: ${{ steps.source-date.outputs.epoch }}
        run: mise run container:build

      - name: Export Digest
        shell: bash
        run: |
          digest="$(jq -r '."containerimage.digest"' "${{ runner.temp }}/metadata.json")"
          mkdir -p "${{ runner.temp }}/digests"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload Digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.runner }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge Manifest
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Download Digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - name: Resolve Image Name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/fgvm" >> "$GITHUB_OUTPUT"

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log In To GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Create And Push Manifest
        working-directory: ${{ runner.temp }}/digests
        shell: bash
        env:
          IMAGE: ${{ steps.image.outputs.name }}
        run: |
          tags=()
          while IFS= read -r tag; do
            tags+=(-t "$tag")
          done < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")

          refs=()
          for digest in *; do
            refs+=("${IMAGE}@sha256:${digest}")
          done

          docker buildx imagetools create "${tags[@]}" "${refs[@]}"

      - name: Inspect Manifest
        shell: bash
        run: docker buildx imagetools inspect "${{ steps.image.outputs.name }}:${{ steps.meta.outputs.version }}"
