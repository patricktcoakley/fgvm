[tools]
dotnet = "10.0.300"
powershell = "7.5.4"

[tasks.test]
description = "Run the unit and integration suites."
dir = "."
depends = ["test:unit", "test:integration:native"]

[tasks."test:unit"]
description = "Run the faster unit tests only."
dir = "."
run = "dotnet test --nologo --configuration Release Fgvm.Tests/Fgvm.Tests.csproj"

[tasks."test:integration"]
description = "Run only the integration tests."
dir = "."
depends = ["test:integration:native"]

[tasks."integration:prepare:native"]
description = "Publish the CLI used by integration tests."
dir = "."
run = "dotnet run Fgvm.Tests.Integration/Fixtures/PublishCli.cs"

[tasks."test:integration:native"]
description = "Run integration tests against the native platform."
dir = "."
depends = ["integration:prepare:native"]
run = "dotnet test --nologo --configuration Release Fgvm.Tests.Integration/Fgvm.Tests.Integration.csproj"

[tasks."e2e:prepare"]
description = "Publish the CLI used by black-box e2e tests."
dir = "."
run = "dotnet run Fgvm.Tests.Integration/Fixtures/PublishCli.cs --output .fgvm-e2e-cli"

[tasks."test:e2e"]
description = "Run black-box e2e smoke tests."
dir = "."
depends = ["e2e:prepare"]
run = "pwsh -NoLogo -NoProfile -File e2e/run.ps1"

[tasks.format]
description = "Format the project with JetBrains cleanupcode."
dir = "."
run = [
    "dotnet tool run jb -- cleanupcode Fgvm.slnx --profile=Cleanup --no-build"
]

[tasks."format:check"]
description = "Verify JetBrains cleanupcode formatting in a clean worktree."
dir = "."
depends = ["format"]
run = [
    "git diff --quiet",
    "git diff --cached --quiet",
    "git diff --exit-code"
]

[tasks.build]
description = "Build the release configuration of the CLI."
dir = "."
run = "dotnet build --nologo --configuration Release Fgvm.Cli/Fgvm.Cli.csproj"

[tasks."build:solution"]
description = "Build all projects in release configuration."
dir = "."
run = "dotnet build --nologo --configuration Release"

[tasks.restore]
description = "Restore all NuGet packages."
dir = "."
run = "dotnet restore"

[tasks.clean]
description = "Clean all build artifacts."
dir = "."
run = "dotnet clean"

[tasks.publish]
description = "Publish the CLI (Release configuration, default RID)."
dir = "."
run = "dotnet publish Fgvm.Cli/Fgvm.Cli.csproj -c Release"

[tasks.versionize]
description = "Update versions and changelog using Versionize."
dir = "."
run = "dotnet tool run versionize"

[tasks."versionize:dry-run"]
description = "Preview the changes Versionize would make."
dir = "."
run = "dotnet tool run versionize --dry-run"
