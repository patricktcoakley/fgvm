[tools]
dotnet = "10.0.300"
powershell = "7.5.4"

[tasks.test]
description = "Run the unit and integration suites."
dir = "."
depends = ["test:unit", "test:integration"]

[tasks."test:unit"]
description = "Run the faster unit tests only."
dir = "."
run = "dotnet test --nologo --configuration Release Fgvm.Tests/Fgvm.Tests.csproj"

[tasks."test:integration"]
description = "Run only the integration tests."
dir = "."
depends = ["integration:prepare"]
run = "dotnet test --nologo --configuration Release Fgvm.Tests.Integration/Fgvm.Tests.Integration.csproj"

[tasks."integration:prepare"]
description = "Publish the CLI used by integration tests."
dir = "."
run = "dotnet run Fgvm.Tests.Integration/Fixtures/PublishCli.cs"

[tasks."e2e:prepare"]
description = "Build fixtures and publish the CLI used by black-box e2e tests."
dir = "."
sources = [
    "Fgvm/**/*.cs",
    "Fgvm.Cli/**/*.cs",
    "Fgvm/Fgvm.csproj",
    "Fgvm.Cli/Fgvm.Cli.csproj",
    "e2e/fixtures/*.cs",
    "e2e/fixtures/*.json",
    "Fgvm.Tests.Integration/Fixtures/PublishCli.cs",
    "Fgvm.slnx",
    "global.json"
]
outputs = { auto = true }
run = [
    "dotnet run e2e/fixtures/BuildFixtures.cs",
    "dotnet run Fgvm.Tests.Integration/Fixtures/PublishCli.cs --output e2e/.cli"
]

[tasks."test:e2e"]
description = "Run black-box e2e tests."
dir = "."
depends = ["e2e:prepare"]
run = "pwsh -NoLogo -NoProfile -File e2e/run.ps1 -Parallel"

[tasks."test:e2e:detailed"]
description = "Run black-box e2e tests with per-test output."
dir = "."
depends = ["e2e:prepare"]
run = "pwsh -NoLogo -NoProfile -File e2e/run.ps1 -Parallel -Verbosity Detailed"

[tasks.format]
description = "Format the project with JetBrains cleanupcode."
dir = "."
run = [
    "dotnet tool run jb -- cleanupcode Fgvm.slnx --profile=Cleanup --no-build"
]

[tasks."format:check"]
description = "Verify JetBrains cleanupcode formatting in a clean worktree."
dir = "."
depends = ["format"]
run = [
    "git diff --quiet",
    "git diff --cached --quiet",
    "git diff --exit-code"
]

[tasks.build]
description = "Build the release configuration of the CLI."
dir = "."
run = "dotnet build --nologo --configuration Release Fgvm.Cli/Fgvm.Cli.csproj"

[tasks."container:build"]
description = "Build the fgvm container image. Loads fgvm:local by default; env vars configure tags/platforms/push for CI."
dir = "."
run = '''
image="${FGVM_IMAGE:-fgvm}"
tags="${FGVM_TAGS:-$image:local}"
epoch="${SOURCE_DATE_EPOCH:-$(git log -1 --format=%ct)}"

set -- --target runtime --build-arg SOURCE_DATE_EPOCH="$epoch" --provenance=false --sbom=false

[ -n "${FGVM_PLATFORMS:-}" ] && set -- "$@" --platform "$FGVM_PLATFORMS"

if [ "${FGVM_PUSH_BY_DIGEST:-false}" = "true" ]; then
  set -- "$@" --output "type=image,name=$image,push-by-digest=true,name-canonical=true,push=true"
  [ -n "${FGVM_METADATA_FILE:-}" ] && set -- "$@" --metadata-file "$FGVM_METADATA_FILE"
else
  for tag in $tags; do
    set -- "$@" --tag "$tag"
  done
  if [ "${FGVM_PUSH:-false}" = "true" ]; then
    set -- "$@" --push
  elif [ "${FGVM_LOAD:-true}" = "true" ]; then
    set -- "$@" --load
  fi
fi

[ -n "${FGVM_CACHE_FROM:-}" ] && set -- "$@" --cache-from "$FGVM_CACHE_FROM"
[ -n "${FGVM_CACHE_TO:-}" ] && set -- "$@" --cache-to "$FGVM_CACHE_TO"

docker buildx build "$@" .
'''

[tasks."build:solution"]
description = "Build all projects in release configuration."
dir = "."
run = "dotnet build --nologo --configuration Release"

[tasks."build:analyze"]
description = "Build all projects with Roslyn analyzers enabled and logging template diagnostics as errors."
dir = "."
run = "dotnet build --nologo --configuration Release Fgvm.slnx /p:RunAnalyzersDuringBuild=true /p:EnableNETAnalyzers=true /p:AnalysisLevel=latest-recommended -warnaserror:CA2254"

[tasks.restore]
description = "Restore all NuGet packages."
dir = "."
run = "dotnet restore"

[tasks.clean]
description = "Clean all build artifacts."
dir = "."
run = "dotnet clean"

[tasks.publish]
description = "Publish the CLI (Release configuration, default RID)."
dir = "."
run = "dotnet publish Fgvm.Cli/Fgvm.Cli.csproj -c Release -o ./.bin"

[tasks."local:run"]
description = "Publish and run the Release configuration."
run = "./.bin/fgvm"
depends = ["publish"]

[tasks."local:container"]
description = "Build and run the local fgvm container image."
dir = "."
depends = ["container:build"]
run = "docker run --rm fgvm:local"

[tasks."container:publish"]
description = "Push the fgvm image for FGVM_TAGS to a registry (host arch unless FGVM_PLATFORMS is set). Requires docker login."
dir = "."
env = { FGVM_PUSH = "true", FGVM_LOAD = "false" }
run = "mise run container:build"

[tasks.versionize]
description = "Update versions and changelog using Versionize."
dir = "."
run = "dotnet tool run versionize"

[tasks."versionize:dry-run"]
description = "Preview the changes Versionize would make."
dir = "."
run = "dotnet tool run versionize --dry-run"
