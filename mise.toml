[tools]
dotnet = "10.0.300"

[tasks.test]
description = "Run the unit and end-to-end suites."
dir = "."
depends = ["test:unit", "test:e2e:native"]

[tasks."test:unit"]
description = "Run the faster unit tests only."
dir = "."
run = "dotnet test --nologo --configuration Release Fgvm.Tests/Fgvm.Tests.csproj"

[tasks."test:e2e"]
description = "Run only the end-to-end tests."
dir = "."
depends = ["test:e2e:native"]

[tasks."e2e:prepare:native"]
description = "Build native fixtures and publish the CLI for the current platform."
dir = "."
run = [
    "dotnet run Fgvm.Tests.EndToEnd/Fixtures/BuildFixtures.cs",
    "dotnet run Fgvm.Tests.EndToEnd/Fixtures/PublishCli.cs"
]

[tasks."test:e2e:native"]
description = "Run end-to-end tests against the native platform."
dir = "."
depends = ["e2e:prepare:native"]
run = "dotnet test --nologo --configuration Release Fgvm.Tests.EndToEnd/Fgvm.Tests.EndToEnd.csproj"

[tasks.format]
description = "Format the project with JetBrains cleanupcode."
dir = "."
run = [
    "dotnet tool run jb -- cleanupcode Fgvm.slnx --profile=Cleanup --no-build"
]

[tasks."format:check"]
description = "Verify JetBrains cleanupcode formatting in a clean worktree."
dir = "."
depends = ["format"]
run = [
    "git diff --quiet",
    "git diff --cached --quiet",
    "git diff --exit-code"
]

[tasks.build]
description = "Build the release configuration of the CLI."
dir = "."
run = "dotnet build --nologo --configuration Release Fgvm.Cli/Fgvm.Cli.csproj"

[tasks.restore]
description = "Restore all NuGet packages."
dir = "."
run = "dotnet restore"

[tasks.clean]
description = "Clean all build artifacts."
dir = "."
run = "dotnet clean"

[tasks.publish]
description = "Publish the CLI (Release configuration, default RID)."
dir = "."
run = "dotnet publish Fgvm.Cli/Fgvm.Cli.csproj -c Release"

[tasks.versionize]
description = "Update versions and changelog using Versionize."
dir = "."
run = "dotnet tool run versionize"

[tasks."versionize:dry-run"]
description = "Preview the changes Versionize would make."
dir = "."
run = "dotnet tool run versionize --dry-run"
